<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GitOps Deployment</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .version {
      font-size: 1.2rem;
      color: #38bdf8;
      margin-bottom: 20px;
    }

    .status {
      padding: 10px 20px;
      background: #22c55e;
      color: #022c22;
      border-radius: 999px;
      display: inline-block;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🚀 GitOps Deployment</h1>
    <div class="version">Version 5 - Live</div>
    <div class="status">SUCCESSFULLY DEPLOYED</div>

    <div class="footer">
      Powered by Docker • Kubernetes • ArgoCD • GitHub Actions
    </div>
  </div>

  <script>
    console.log("GitOps Version 5 deployed 🚀");
  </script>
</body>
</html>
