name: CI Pipeline

on:
  push:
    paths:
      - "app-code/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout app repo
        uses: actions/checkout@v4

      # Docker login
      - name: Login to DockerHub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Build image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/gitops-nginx:${{ github.sha }} ./app-code

      # Push image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/gitops-nginx:${{ github.sha }}

      # Update GitOps Repo (FIXED)
      - name: Update GitOps Repo
        run: |
          # Clone GitOps repo with token
          git clone https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/dvanhu/gitops-multi-env-deployment.git
          cd gitops-multi-env-deployment

          # Ensure correct branch
          git checkout main

          # Update image in correct file
          sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/gitops-nginx:${{ github.sha }}|g" apps/nginx/base/deployment.yaml

          # Git config
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Ensure auth persists
          git remote set-url origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/dvanhu/gitops-multi-env-deployment.git

          # Commit only if changes exist
          git add .
          git diff --cached --quiet || git commit -m "update image to ${{ github.sha }}"

          # Push safely
          git push origin main
